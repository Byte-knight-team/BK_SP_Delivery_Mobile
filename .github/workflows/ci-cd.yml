name: CI / CD — CraveHouse Delivery Mobile

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────
  # CI JOB — Runs on every push to main AND every PR targeting main.
  # Validates that the project is healthy before any build is triggered.
  # ─────────────────────────────────────────────────────────────────
  lint-and-check:
    name: CI — Lint & Expo Doctor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check code formatting (Prettier)
        run: npm run lint

      - name: Validate Expo config & SDK compatibility
        run: npx expo-doctor@latest

  # ─────────────────────────────────────────────────────────────────
  # CD JOB — Runs ONLY on push to main (not on PRs).
  # Submits an EAS cloud build and produces a .apk for distribution.
  # ─────────────────────────────────────────────────────────────────
  eas-build:
    name: CD — EAS Build (Android APK)
    runs-on: ubuntu-latest
    needs: lint-and-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Set up Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK via EAS
        run: eas build --platform android --profile preview --non-interactive
